<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS 92 - Choix de Garde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar for the large matrix */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animation de Focus pour les gardes PROPOSÉES par le moteur (anticipation) */
        @keyframes proposal-flash {
            0%, 100% { 
                background-color: #fbbf24; /* Amber 400 */
                transform: scale(1);
                box-shadow: 0 0 0px rgba(251, 191, 36, 0);
                border: 2px solid #fbbf24;
            }
            50% { 
                background-color: #f59e0b; /* Amber 500 */
                transform: scale(1.2);
                box-shadow: 0 0 35px rgba(245, 158, 11, 1);
                z-index: 60;
                border: 2px solid white;
            }
        }
        .animate-proposal-focus {
            animation: proposal-flash 0.5s ease-in-out infinite;
            border-radius: 4px;
        }
    </style>
